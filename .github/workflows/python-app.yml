name: BuildProDrive APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --upgrade pip
          # Correction : Cython 3.x est souvent requis pour les versions récentes de Kivy/Buildozer
          pip install Cython buildozer 
          pip install reportlab pillow

      # ÉTAPE CRUCIALE : Accepter les licences Android avant de lancer Buildozer
      - name: Accept Android Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Build APK
        env:
          # Utilisation des chemins par défaut de l'image GitHub Actions
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          # On ne fait pas de 'clean' sur un runner neuf, c'est inutile
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ProDrive-APK
          path: bin/*.apk
