name: Build ProDrive APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev libsqlite3-dev libgmp-dev
          pip install --upgrade Cython==0.29.33 buildozer

      - name: Cache Buildozer Data
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}

      - name: Build APK with Buildozer
        run: |
          # On laisse Buildozer gérer le SDK/NDK dans son propre dossier .buildozer
          yes | buildozer -v android debug

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: ProDrive-APK-File
          path: bin/*.apk
